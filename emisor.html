<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Móvil - Camtin Audio Live</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- PeerJS para señalización WebRTC gratis -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>

<body>
    <div class="background-overlay transmitter-bg"></div>
    <div class="glass-panel">
        <div class="header">
            <h1>Transmisor Móvil</h1>
            <p>Envía tu voz en vivo al estudio</p>
        </div>

        <div class="status-indicator">
            <div id="ledIndicator" class="led-red"></div>
            <span id="statusLabel">Desconectado</span>
        </div>

        <div class="input-group">
            <input type="text" id="targetIdInput" placeholder="Ingresa el ID del Estudio..." autocomplete="off">
        </div>

        <button id="callBtn" class="premium-button">
            <div class="glow-effect"></div>
            <span id="btnText">Conectar y Transmitir</span>
        </button>

        <div class="tips">
            <p>Ingresa el ID que aparece en la pantalla de la computadora y presiona conectar.</p>
        </div>
    </div>
    <script src="emisor.js"></script>
</body>

</html>
